<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Fighter</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    background: #222;
    border: 3px solid #555;
    image-rendering: pixelated;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// simple fighter class
class Fighter {
  constructor(x, color, controls) {
    this.x = x;
    this.y = 300;
    this.w = 40;
    this.h = 60;
    this.vy = 0;
    this.color = color;
    this.health = 100;
    this.isPunching = false;

    this.controls = controls;
    this.speed = 4;
  }

  update() {
    // gravity
    this.y += this.vy;
    if (this.y < 300) this.vy += 0.8;
    else {
      this.vy = 0;
      this.y = 300;
    }

    // punch reset
    if (this.isPunching) {
      setTimeout(() => this.isPunching = false, 200);
    }
  }

  draw() {
    ctx.fillStyle = this.color;

    // body
    ctx.fillRect(this.x, this.y, this.w, this.h);

    // arm (punch effect)
    if (this.isPunching) {
      ctx.fillRect(this.x + this.w, this.y + 20, 20, 10);
    }
  }

  punch(opponent) {
    if (Math.abs(this.x - opponent.x) < 50) {
      opponent.health -= 10;
    }
    this.isPunching = true;
  }
}

// players
const p1 = new Fighter(100, "red", {
  left: "a",
  right: "d",
  punch: "w",
  jump: "s"
});

const p2 = new Fighter(600, "blue", {
  left: "ArrowLeft",
  right: "ArrowRight",
  punch: "ArrowUp",
  jump: "ArrowDown"
});

// input
const keys = {};

window.addEventListener("keydown", (e) => {
  keys[e.key] = true;

  // player 1
  if (e.key === p1.controls.left) p1.x -= p1.speed;
  if (e.key === p1.controls.right) p1.x += p1.speed;
  if (e.key === p1.controls.jump && p1.y === 300) p1.vy = -12;
  if (e.key === p1.controls.punch) p1.punch(p2);

  // player 2
  if (e.key === p2.controls.left) p2.x -= p2.speed;
  if (e.key === p2.controls.right) p2.x += p2.speed;
  if (e.key === p2.controls.jump && p2.y === 300) p2.vy = -12;
  if (e.key === p2.controls.punch) p2.punch(p1);
});

function drawHealth() {
  ctx.fillStyle = "white";
  ctx.fillText("P1 HP: " + p1.health, 20, 20);
  ctx.fillText("P2 HP: " + p2.health, 650, 20);
}

// game loop
function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ground
  ctx.fillStyle = "#333";
  ctx.fillRect(0, 360, 800, 40);

  p1.update();
  p2.update();

  p1.draw();
  p2.draw();

  drawHealth();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
