<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Fighter Improved</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    background: white;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

class Fighter {
  constructor(x, color) {
    this.x = x;
    this.y = 300;
    this.vy = 0;
    this.onGround = true;

    this.color = color;
    this.health = 100;

    this.moving = false;
    this.punching = false;
    this.punchTimer = 0;
    this.facing = 1; // 1 right, -1 left
  }

  update() {
    // gravity
    this.y += this.vy;
    if (this.y < 300) this.vy += 0.8;
    else {
      this.y = 300;
      this.vy = 0;
      this.onGround = true;
    }

    // punch reset
    if (this.punching) {
      this.punchTimer++;
      if (this.punchTimer > 10) {
        this.punching = false;
        this.punchTimer = 0;
      }
    }

    this.moving = false;
  }

  draw() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 6;
    ctx.lineCap = "round";

    let tilt = this.moving ? 10 : 0;

    // head
    ctx.beginPath();
    ctx.arc(this.x, this.y - 40, 10, 0, Math.PI * 2);
    ctx.stroke();

    // body (lean forward when running)
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 30);
    ctx.lineTo(this.x + this.facing * tilt, this.y);
    ctx.stroke();

    // legs (running animation)
    ctx.beginPath();
    if (this.moving) {
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - this.facing * 15, this.y + 20);

      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.facing * 15, this.y + 20);
    } else {
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - 10, this.y + 20);

      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + 10, this.y + 20);
    }
    ctx.stroke();

    // arms
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 20);

    if (this.punching) {
      ctx.lineTo(this.x + this.facing * 25, this.y - 10);
    } else if (this.moving) {
      ctx.lineTo(this.x - this.facing * 15, this.y - 10);
    } else {
      ctx.lineTo(this.x - 10, this.y - 10);
    }

    ctx.moveTo(this.x, this.y - 20);
    ctx.lineTo(this.x + 10, this.y - 10);
    ctx.stroke();
  }

  move(dir) {
    this.x += dir * 5;
    this.facing = dir;
    this.moving = true;
  }

  jump() {
    if (this.onGround) {
      this.vy = -12;
      this.onGround = false;
    }
  }

  punch(opponent) {
    this.punching = true;

    if (Math.abs(this.x - opponent.x) < 50 &&
        Math.abs(this.y - opponent.y) < 50) {
      opponent.health -= 10;
    }
  }
}

const p1 = new Fighter(200, "black");
const p2 = new Fighter(600, "red");

document.addEventListener("keydown", (e) => {

  // PLAYER 1
  if (e.key === "a") p1.move(-1);
  if (e.key === "d") p1.move(1);
  if (e.key === "w") p1.jump();
  if (e.key === " ") p1.punch(p2);

  // PLAYER 2
  if (e.key === "ArrowLeft") p2.move(-1);
  if (e.key === "ArrowRight") p2.move(1);
  if (e.key === "ArrowUp") p2.jump();
  if (e.key === "Enter") p2.punch(p1);
});

function drawGround() {
  ctx.strokeStyle = "#aaa";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 360);
  ctx.lineTo(800, 360);
  ctx.stroke();
}

function drawUI() {
  ctx.fillStyle = "black";
  ctx.font = "16px Arial";
  ctx.fillText("P1 HP: " + p1.health, 20, 20);
  ctx.fillText("P2 HP: " + p2.health, 650, 20);
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGround();

  p1.update();
  p2.update();

  p1.draw();
  p2.draw();

  drawUI();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
