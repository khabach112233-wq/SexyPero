<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Fighter AI</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    background: white;
  }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

class Fighter {
  constructor(x, color, isAI = false) {
    this.x = x;
    this.y = 300;
    this.vy = 0;
    this.onGround = true;

    this.color = color;
    this.health = 100;

    this.moving = false;
    this.punching = false;
    this.punchTimer = 0;
    this.facing = 1;

    this.isAI = isAI;
  }

  update() {
    // gravity
    this.y += this.vy;
    if (this.y < 300) this.vy += 0.8;
    else {
      this.y = 300;
      this.vy = 0;
      this.onGround = true;
    }

    // punch reset
    if (this.punching) {
      this.punchTimer++;
      if (this.punchTimer > 10) {
        this.punching = false;
        this.punchTimer = 0;
      }
    }

    this.moving = false;
  }

  draw() {
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 6;
    ctx.lineCap = "round";

    let tilt = this.moving ? 10 : 0;

    // head
    ctx.beginPath();
    ctx.arc(this.x, this.y - 40, 10, 0, Math.PI * 2);
    ctx.stroke();

    // body
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 30);
    ctx.lineTo(this.x + this.facing * tilt, this.y);
    ctx.stroke();

    // legs
    ctx.beginPath();
    if (this.moving) {
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - this.facing * 15, this.y + 20);
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + this.facing * 15, this.y + 20);
    } else {
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x - 10, this.y + 20);
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.x + 10, this.y + 20);
    }
    ctx.stroke();

    // arms
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - 20);

    if (this.punching) {
      ctx.lineTo(this.x + this.facing * 25, this.y - 10);
    } else if (this.moving) {
      ctx.lineTo(this.x - this.facing * 15, this.y - 10);
    } else {
      ctx.lineTo(this.x - 10, this.y - 10);
    }

    ctx.moveTo(this.x, this.y - 20);
    ctx.lineTo(this.x + 10, this.y - 10);
    ctx.stroke();
  }

  move(dir) {
    this.x += dir * 5;
    this.facing = dir;
    this.moving = true;
  }

  jump() {
    if (this.onGround) {
      this.vy = -12;
      this.onGround = false;
    }
  }

  punch(opponent) {
    this.punching = true;

    if (Math.abs(this.x - opponent.x) < 50 &&
        Math.abs(this.y - opponent.y) < 50) {
      opponent.health -= 10;
    }
  }

  // 🤖 AI logic
  ai(target) {
    if (!this.isAI) return;

    let dist = target.x - this.x;

    // face player
    this.facing = dist > 0 ? 1 : -1;

    // move toward player
    if (Math.abs(dist) > 60) {
      this.move(this.facing);
    }

    // punch if close
    if (Math.abs(dist) < 70) {
      this.punch(target);
    }

    // random jump
    if (Math.random() < 0.01 && this.onGround) {
      this.jump();
    }
  }
}

// PLAYER + AI
const player = new Fighter(200, "black", false);
const enemy = new Fighter(600, "red", true);

// controls
document.addEventListener("keydown", (e) => {

  // PLAYER ONLY
  if (e.key === "a") player.move(-1);
  if (e.key === "d") player.move(1);
  if (e.key === "w") player.jump();
  if (e.key === " ") player.punch(enemy);
});

function drawGround() {
  ctx.strokeStyle = "#aaa";
  ctx.beginPath();
  ctx.moveTo(0, 360);
  ctx.lineTo(800, 360);
  ctx.stroke();
}

function drawUI() {
  ctx.fillStyle = "black";
  ctx.font = "16px Arial";
  ctx.fillText("PLAYER HP: " + player.health, 20, 20);
  ctx.fillText("ENEMY HP: " + enemy.health, 600, 20);
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawGround();

  player.update();
  enemy.update();

  // 🤖 AI runs here
  enemy.ai(player);

  player.draw();
  enemy.draw();

  drawUI();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
